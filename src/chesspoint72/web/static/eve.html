<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chesspoint72 · Engine vs Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/static/css/app.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Chesspoint72</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" data-nav href="/">Human vs Engine</a>
            <a class="nav-link" data-nav href="/eve">Engine vs Engine</a>
            <a class="nav-link" data-nav href="/tournament">Tournament</a>
            <a class="nav-link" data-nav href="/build">Build Your Engine</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-4 align-items-start">
        <div class="col-12 col-lg-auto">
          <div class="surface p-3">
            <div class="d-flex align-items-center justify-content-between surface-header pb-2 mb-3">
              <div>
                <div class="fw-semibold">Engine vs Engine</div>
                <div class="small-muted">Watch two engines play, paced for demos.</div>
              </div>
              <div class="status-pill" id="statusPill">
                <span class="status-dot" data-status-dot></span>
                <span data-status-text>Ready</span>
              </div>
            </div>

            <div class="board-wrap">
              <div id="board" class="board-grid surface" style="border-radius: 10px;"></div>
            </div>

            <div class="d-flex gap-2 mt-3">
              <button class="btn btn-outline-light btn-sm" id="copyFenBtn" disabled>Copy FEN</button>
              <div class="small-muted ms-auto align-self-center" id="fenLabel"></div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg">
          <div class="surface p-3">
            <div class="surface-header pb-2 mb-3">
              <div class="fw-semibold">Match controls</div>
              <div class="small-muted">Wiring comes next (Page 2).</div>
            </div>

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label">White</label>
                <select class="form-select" id="engine1Select"></select>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Black</label>
                <select class="form-select" id="engine2Select"></select>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Depth <span class="small-muted" id="depthLabel">(4)</span></label>
                <input class="form-range" id="depthRange" type="range" min="1" max="6" value="4" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Move delay <span class="small-muted" id="delayLabel">(500ms)</span></label>
                <input class="form-range" id="delayRange" type="range" min="0" max="2000" step="100" value="500" />
              </div>
              <div class="col-12 d-flex gap-2">
                <button class="btn btn-accent w-100" id="startBtn">Start match</button>
                <button class="btn btn-outline-danger w-100" id="stopBtn" disabled>Stop</button>
              </div>

              <div class="col-12">
                <div class="surface p-3">
                  <div class="fw-semibold mb-1">Scoreboard</div>
                  <div class="small-muted" id="scoreLine">W 0 · D 0 · L 0</div>
                </div>
              </div>

              <div class="col-12">
                <div class="surface p-3">
                  <div class="fw-semibold mb-1">Move list</div>
                  <div class="move-list" id="moveList"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { setActiveNav } from "/static/js/shared.js";
      setActiveNav(window.location.pathname);
    </script>
    <script type="module" src="/static/js/eve.js"></script>
  </body>
</html>
